<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Docket — AI-Enabled Roll-Up Dashboard</title>
<meta name="description" content="Deal-sourcing and screening dashboard: five weighted criteria, drag-to-reweight, a live-reranking 30-deal illustrative pipeline across 10 service verticals. All data fictional.">
<meta property="og:title" content="Deal Docket — AI-Enabled Roll-Up Dashboard">
<meta property="og:description" content="Deal-sourcing and screening dashboard: five weighted criteria, drag-to-reweight, a live-reranking 30-deal illustrative pipeline across 10 service verticals. All data fictional.">
<meta property="og:url" content="https://bakulbadwal.github.io/dealdocket/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://bakulbadwal.github.io/dealdocket/docs/screenshot.png">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="800">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Deal Docket — AI-Enabled Roll-Up Dashboard">
<meta name="twitter:description" content="Deal-sourcing and screening dashboard: five weighted criteria, drag-to-reweight, a live-reranking 30-deal illustrative pipeline across 10 service verticals. All data fictional.">
<meta name="twitter:image" content="https://bakulbadwal.github.io/dealdocket/docs/screenshot.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="app">
  <header>
    <div>
      <div class="eyebrow" id="eyebrow"></div>
      <h1 id="title"></h1>
      <span class="sub" id="subtitle"></span>
      <div class="as-of" id="asOf"></div>
    </div>
    <div class="header-ticker">
      Avg weighted score
      <span class="big" id="tickerScore">—</span>
    </div>
  </header>

  <div class="disclaimer" id="disclaimer"></div>

  <div class="section-title">Thesis</div>
  <div class="thesis-card">
    <p class="thesis-headline" id="thesisHeadline"></p>
    <p class="thesis-body" id="thesisBody"></p>
  </div>

  <div class="section-title">Five-box screen — drag to re-weight, pipeline re-ranks live</div>
  <div class="presets-row" id="presetsRoot"></div>
  <div class="framework-grid" id="frameworkRoot"></div>

  <div class="section-title">Pipeline</div>
  <div class="controls-bar">
    <input type="text" id="searchInput" placeholder="Search name, vertical, location...">
    <select id="verticalFilter"></select>
    <select id="stageFilter"></select>
    <select id="channelFilter"></select>
    <label class="checkbox-label"><input type="checkbox" id="activeOnly"> Active only</label>
    <select id="sortSelect">
      <option value="composite-desc">Score: high to low</option>
      <option value="composite-asc">Score: low to high</option>
      <option value="sourced-desc">Recently sourced</option>
      <option value="ebitda-desc">EBITDA: high to low</option>
    </select>
  </div>

  <div class="stats-row" id="statsRoot"></div>

  <table class="pipeline-table">
    <thead>
      <tr>
        <th>Deal</th>
        <th>Stage</th>
        <th>Channel</th>
        <th>Financials</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="pipelineRoot"></tbody>
  </table>

  <footer id="footerText">
    Illustrative data only — see disclaimer above. Built by Bakul Badwal with Claude Code. MIT licensed.
  </footer>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">&times;</button>
  <div id="drawerBody"></div>
</div>

<script src="app.js"></script>
</body>
</html>
